server.port=7860
server.address=0.0.0.0
spring.application.name=Quantifyre_Iris_SuperAdmin


# ==========================================
# POSTGRESQL CONFIGURATION (Supabase)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
spring.main.allow-bean-definition-overriding=true

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# ==========================================
# MONGODB CONFIGURATION
# ==========================================
spring.data.mongodb.uri=${SPRING_MONGODB_URI}

# ==========================================
# GOOGLE INTEGRATIONS (Required by Common Module)
# ==========================================
google.ads.client-id=${GOOGLE_CLIENT_ID}
google.ads.client-secret=${GOOGLE_ADS_CLIENT_SECRET}
google.ads.callback-url=${GOOGLE_ADS_CALLBACK_URL}

google.ads.developer-token=${GOOGLE_DEVELOPER_TOKEN}
google.ads.customer-id=${GOOGLE_ADS_CUSTOMER_ID}

facebook.app-id=${FACEBOOK_APP_ID}
facebook.app-secret=${FACEBOOK_APP_SECRET}
facebook.callback-url=${FACEBOOK_ADS_CALLBACK_URL}

# ==========================================
# EMAIL CONFIGURATION (For Common Module Service)
# ==========================================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}

# Supabase S3 Details
supabase.s3.endpoint=${SUPABASE_S3_ENDPOINT}
supabase.s3.accessKey=${SUPABASE_S3_ACCESS_KEY}
supabase.s3.secretKey=${SUPABASE_S3_SECRET_KEY}
supabase.bucket=${SUPABASE_BUCKET_NAME}

# Public URL (Profile dikhane ke liye)
supabase.url=${SUPABASE_URL}
